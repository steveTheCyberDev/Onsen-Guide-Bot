# ─────────────────────────────────────────────────────────────────────────────
# Onsen Guide Bot — Continuous Integration
#
# Jobs defined here:
#   backend-tests   — lint-free pytest run (Python 3.12). Runs on backend/**
#                     changes, PRs, and pushes to any branch.
#   frontend-tests  — Vitest 2.x + Node 20.16.0. Runs on frontend/**
#                     changes, PRs, and pushes to any branch.
#
# Branch-protection note: this file only DEFINES the jobs and runs them on
# every PR. It cannot make them mandatory on its own — to require them before a
# merge to main, mark both jobs as required status checks via branch protection
# (GitHub → Settings → Branches → branch protection rule for main).
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    paths:
      # Run whenever backend or frontend source or their dependencies change.
      # workflow_dispatch (below) always runs regardless of paths.
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
  # Allow a manual trigger from the Actions tab — useful for verifying the
  # pipeline after Railway provisioning without needing a code change.
  workflow_dispatch:

jobs:
  # ── Backend test gate ───────────────────────────────────────────────────────
  backend-tests:
    name: Backend — pytest (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache pip's download cache keyed on the exact requirements file.
          # A requirements.txt change busts the cache automatically.
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        # pytest.ini sets testpaths = tests, so just running `pytest` from the
        # backend/ directory is enough — no extra flags needed.
        # conftest.py injects dummy env vars (no real secrets required here).
        working-directory: backend
        run: pytest

  # ── Frontend test gate ──────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Vitest (Node 20.16.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Reads the exact version from frontend/.nvmrc (currently 20.16.0).
          # Vitest 2.x + jsdom 25.x are pinned in package.json — do NOT bump
          # these; newer versions break on this project.
          node-version-file: frontend/.nvmrc
          cache: npm
          # Bust the cache only when the lockfile changes, not on every run.
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        # npm ci ensures a clean, reproducible install from the lockfile.
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        # package.json "test" script is `vitest run` — no extra --run flag needed.
        run: npm test
        env:
          # Vite requires these vars to be defined even for unit tests that
          # don't exercise the API or Maps SDK.  Dummy values are fine here.
          VITE_API_URL: http://localhost:8000
          VITE_GOOGLE_MAPS_API_KEY: test-maps-key
